<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medicare - Online Pharmacy</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <div class="logo">Medicare</div>

      <nav>
        <a href="#">Home</a>
        <a href="#">Medicines</a>
        <a href="#">book appotements</a>
        <a href="#">offers</a>
      </nav>
      <input type="text" placeholder="Search medicines..." class="search" />
      <button class="sign-up">sign up</button>
      <button class="login-btn">login</button>
    </header>

    <section class="hero">
      <h1>Your Online Pharmacy</h1>
      <p>Get medicines delivered to your doorstep</p>
      <button>Shop Now</button>
    </section>

    <section class="products">
      <h2>Popular Medicines</h2>

      <div class="product-container">
        <div class="card">
          <img src="https://via.placeholder.com/150" />
          <h3>Paracetamol</h3>
          <p>₹50</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/150" />
          <h3>Vitamin C</h3>
          <p>₹120</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/150" />
          <h3>Cold Syrup</h3>
          <p>₹90</p>
          <button>Add to Cart</button>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/150" />
          <h3>Protein Powder</h3>
          <p>₹850</p>
          <button>Add to Cart</button>
        </div>
      </div>
    </section>

    <footer>
      <p>© 2026 Medicare Pharmacy | All Rights Reserved</p>
    </footer>
  </body>
</html>
