<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login-registration</title>
    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <form id="contioner">
      <div>
        <h3>Login Form</h3>
      </div>
      <div class="button">
        <button class="login">login</button>
        <button class="sign-up">
          <a href="../Signup-page/sign-up.html">sign up</a>
        </button>
      </div>
      <br />
      <label>First Name:-</label>
      <input type="text" placeholder="inter first name" required />
      <br />
      <br />
      <label>Last Name:-</label>
      <br />
      <input type="text" placeholder="inter last name" required /><br /><br />
      <label>Gmail:-</label>
      <br />
      <input type="text" placeholder="inter your gmail" required />
      <br />
      <span class="span"><a href=""> forget password!</a></span>
      <br />
      <button
        class="submit"
        type="submit "
        name="submit"
        value="submit"
        onclick="submit()"
      >
        submit
      </button>
      <br />
      <p>not a Mamber!<a href="#">Sign now</a></p>
    </form>

    <script>
      function showAlert() {
        alert("Your form will be submitted");
      }

      let contioner = document.getElementById("contioner");

      function hideshow() {
        if (
          contioner.style.display === "none" ||
          contioner.style.display === ""
        ) {
          contioner.style.display = "block";
        } else {
          contioner.style.display = "none";
        }
      }
    </script>
  </body>
</html>
